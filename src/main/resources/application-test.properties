spring.datasource.url=${TEST_DB_URL:${DB_URL:jdbc:mysql://localhost:3306/internship_tracker_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${TEST_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.baseline-on-migrate=true

jwt.secret=${TEST_JWT_SECRET:test-secret-key-with-at-least-32-bytes}
jwt.expiration-ms=${TEST_JWT_EXPIRATION_MS:3600000}
