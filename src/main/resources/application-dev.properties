spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/internship_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}

auth.login-rate-limit.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
auth.login-rate-limit.window-minutes=${LOGIN_RATE_LIMIT_WINDOW_MINUTES:15}
