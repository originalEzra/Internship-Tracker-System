spring.application.name=internship-tracker

spring.data.redis.repositories.enabled=false

jwt.secret=${JWT_SECRET:internship-tracker-dev-secret-key-32bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

assistant.llm.enabled=${ASSISTANT_LLM_ENABLED:false}
assistant.llm.provider=${ASSISTANT_LLM_PROVIDER:openai}
assistant.llm.api-key=${ASSISTANT_LLM_API_KEY:}
assistant.llm.model=${ASSISTANT_LLM_MODEL:gpt-4.1-mini}
assistant.llm.base-url=${ASSISTANT_LLM_BASE_URL:https://api.openai.com/v1/responses}
